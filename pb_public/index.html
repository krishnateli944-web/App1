<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Muze — Apna DB, Apna Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --surface: #0f0f1a;
  --surface2: #161625;
  --border: rgba(120,100,255,0.15);
  --border2: rgba(255,255,255,0.07);
  --accent: #7c5cfc;
  --accent2: #ff4d8d;
  --text: #e8e8f0;
  --muted: #5a5a7a;
  --mine: rgba(124,92,252,0.18);
  --theirs: rgba(255,255,255,0.04);
  --glow: rgba(124,92,252,0.3);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; }

/* ── SETUP SCREEN ── */
#setup {
  height:100vh; display:flex; align-items:center; justify-content:center;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(124,92,252,0.2) 0%, transparent 70%),
              radial-gradient(ellipse 60% 40% at 80% 100%, rgba(255,77,141,0.12) 0%, transparent 60%),
              var(--bg);
}
.setup-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 40px 32px;
  width: min(360px, calc(100vw - 32px));
  box-shadow: 0 0 80px rgba(124,92,252,0.15), 0 24px 48px rgba(0,0,0,0.6);
}
.logo { font-family:'Syne',sans-serif; font-size:32px; font-weight:800; letter-spacing:-1px; }
.logo span { color:var(--accent); }
.tagline { color:var(--muted); font-size:13px; margin-top:4px; margin-bottom:28px; }
.field {
  width:100%; padding:12px 16px; border-radius:12px;
  border:1px solid var(--border); background:var(--surface2);
  color:var(--text); font-size:14px; font-family:'DM Sans',sans-serif;
  margin-bottom:10px; outline:none; transition:border-color .2s;
}
.field:focus { border-color:var(--accent); }
.field::placeholder { color:var(--muted); }
.btn-primary {
  width:100%; padding:13px; background:var(--accent);
  color:white; border:none; border-radius:12px;
  font-size:15px; font-weight:600; font-family:'Syne',sans-serif;
  cursor:pointer; letter-spacing:.3px;
  transition:opacity .2s, transform .1s;
}
.btn-primary:active { transform:scale(.98); opacity:.9; }
.err-msg { color:var(--accent2); font-size:12px; margin-bottom:10px; display:none; }

/* ── AUTH SCREEN ── */
#auth { display:none; height:100vh; align-items:center; justify-content:center;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(124,92,252,0.2) 0%, transparent 70%), var(--bg); }
.auth-card { background:var(--surface); border:1px solid var(--border); border-radius:24px; padding:36px 28px; width:min(340px,calc(100vw - 32px)); }
.auth-title { font-family:'Syne',sans-serif; font-size:22px; font-weight:700; margin-bottom:6px; }
.auth-sub { color:var(--muted); font-size:13px; margin-bottom:24px; }
.link-btn { background:none; border:none; color:var(--accent); cursor:pointer; font-size:13px; text-decoration:underline; font-family:'DM Sans',sans-serif; }
.switch-row { text-align:center; margin-top:16px; color:var(--muted); font-size:13px; }

/* ── MAIN APP ── */
#app { display:none; height:100vh; flex-direction:column; width:100%; }

/* Header */
.app-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 18px; background:var(--surface);
  border-bottom:1px solid var(--border2); flex-shrink:0;
}
.app-logo { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; }
.app-logo span { color:var(--accent); }
.user-pill {
  display:flex; align-items:center; gap:8px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:20px; padding:6px 12px 6px 6px; font-size:13px;
}
.logout-btn { background:none; border:none; color:var(--muted); cursor:pointer; font-size:18px; }

/* Tabs */
.tabs { display:flex; border-bottom:1px solid var(--border2); flex-shrink:0; }
.tab {
  flex:1; padding:12px; background:none; border:none; color:var(--muted);
  cursor:pointer; font-size:13px; font-family:'DM Sans',sans-serif; font-weight:500;
  border-bottom:2px solid transparent; transition:all .2s;
}
.tab.active { color:var(--accent); border-bottom-color:var(--accent); background:rgba(124,92,252,0.06); }

/* List */
.list { flex:1; overflow-y:auto; padding:8px; }
.list::-webkit-scrollbar { width:4px; }
.list::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
.chat-item {
  display:flex; align-items:center; gap:12px;
  padding:12px; border-radius:14px; cursor:pointer;
  margin-bottom:4px; border:1px solid transparent;
  transition:all .15s;
}
.chat-item:active { background:rgba(124,92,252,0.12); }
.chat-item.active { background:rgba(124,92,252,0.15); border-color:var(--border); }
.chat-item-info { flex:1; min-width:0; }
.chat-item-name { font-weight:500; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.chat-item-sub { font-size:11px; color:var(--muted); margin-top:2px; }

/* Avatar */
.av {
  width:40px; height:40px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-family:'Syne',sans-serif; font-size:15px; font-weight:700;
}

/* Empty state */
.empty { text-align:center; padding:48px 24px; color:var(--muted); }
.empty-icon { font-size:42px; margin-bottom:12px; }
.empty-title { font-size:16px; font-weight:500; margin-bottom:6px; color:var(--text); }
.empty-sub { font-size:13px; line-height:1.5; }

/* ── CHAT VIEW ── */
#chatView {
  display:none; position:fixed; inset:0; z-index:50;
  background:var(--bg); flex-direction:column;
}
.chat-header {
  display:flex; align-items:center; gap:12px;
  padding:12px 16px; background:var(--surface);
  border-bottom:1px solid var(--border2); flex-shrink:0;
}
.back-btn { background:none; border:none; color:var(--accent); font-size:22px; cursor:pointer; padding:0 6px 0 0; }
.chat-header-info { flex:1; min-width:0; }
.chat-header-name { font-family:'Syne',sans-serif; font-weight:700; font-size:16px; }
.chat-header-sub { font-size:11px; color:var(--muted); margin-top:2px; }

.msgs-area { flex:1; overflow-y:auto; padding:16px 12px; display:flex; flex-direction:column; gap:10px; }
.msgs-area::-webkit-scrollbar { width:4px; }
.msgs-area::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

.bubble {
  max-width:78%; padding:10px 14px; border-radius:18px;
  font-size:14px; line-height:1.55; position:relative;
}
.bubble.mine { align-self:flex-end; background:var(--mine); border:1px solid rgba(124,92,252,0.25); border-bottom-right-radius:4px; }
.bubble.theirs { align-self:flex-start; background:var(--theirs); border:1px solid var(--border2); border-bottom-left-radius:4px; }
.bubble-sender { font-size:11px; color:var(--accent); margin-bottom:4px; font-weight:600; }
.bubble-fwd { font-size:11px; color:var(--muted); margin-bottom:4px; padding-left:8px; border-left:2px solid var(--muted); }
.bubble-time { font-size:10px; color:var(--muted); margin-top:5px; }
.bubble-time.right { text-align:right; }
.bubble img, .bubble video { width:100%; border-radius:10px; margin-top:6px; max-height:200px; object-fit:cover; display:block; }
.bubble-actions { display:flex; gap:6px; margin-top:6px; flex-wrap:wrap; }
.micro-btn {
  font-size:11px; padding:4px 8px; border-radius:8px;
  background:rgba(255,255,255,0.05); border:1px solid var(--border2);
  color:var(--muted); cursor:pointer; font-family:'DM Sans',sans-serif;
  transition:all .15s;
}
.micro-btn:active { background:var(--border); color:var(--text); }

/* Input row */
.input-area {
  padding:10px 12px; background:var(--surface);
  border-top:1px solid var(--border2); flex-shrink:0;
}
.file-preview {
  display:none; font-size:12px; color:var(--accent);
  padding:4px 0 6px; display:none; align-items:center; gap:6px;
}
.input-row { display:flex; gap:8px; align-items:center; }
.attach-btn {
  width:44px; height:44px; border-radius:12px; border:1px solid var(--border);
  background:var(--surface2); color:var(--text); font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.msg-input {
  flex:1; padding:11px 14px; border-radius:12px;
  border:1px solid var(--border); background:var(--surface2);
  color:var(--text); font-size:14px; font-family:'DM Sans',sans-serif;
  outline:none; transition:border-color .2s;
}
.msg-input:focus { border-color:var(--accent); }
.msg-input::placeholder { color:var(--muted); }
.send-btn {
  width:44px; height:44px; border-radius:12px;
  background:var(--accent); border:none; color:white;
  font-size:18px; cursor:pointer; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  transition:opacity .2s, transform .1s;
}
.send-btn:active { transform:scale(.92); opacity:.85; }

/* ── FORWARD OVERLAY ── */
#fwdOverlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.85);
  display:none; align-items:flex-end; justify-content:center; z-index:200;
  backdrop-filter:blur(4px);
}
.fwd-sheet {
  background:var(--surface); border:1px solid var(--border);
  border-radius:24px 24px 0 0; padding:24px 20px;
  width:100%; max-height:70vh; overflow-y:auto;
  animation: slideUp .25s ease;
}
@keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
.fwd-title { font-family:'Syne',sans-serif; font-size:18px; font-weight:700; margin-bottom:4px; }
.fwd-sub { font-size:12px; color:var(--muted); margin-bottom:20px; }
.cancel-btn {
  width:100%; padding:12px; margin-top:12px;
  background:var(--surface2); border:1px solid var(--border2);
  border-radius:12px; color:var(--muted); cursor:pointer;
  font-family:'DM Sans',sans-serif; font-size:14px;
}

/* Loading spinner */
.spinner {
  width:24px; height:24px; border:2px solid var(--border);
  border-top-color:var(--accent); border-radius:50%;
  animation:spin .7s linear infinite; margin:24px auto;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* Toast */
#toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:var(--surface2); border:1px solid var(--border);
  border-radius:12px; padding:10px 20px; font-size:13px; z-index:999;
  opacity:0; transition:opacity .3s; pointer-events:none; white-space:nowrap;
}
#toast.show { opacity:1; }

/* Typing indicator */
.typing { display:flex; gap:4px; padding:8px 12px; align-self:flex-start; }
.typing span { width:6px; height:6px; background:var(--muted); border-radius:50%; animation:bounce .8s infinite; }
.typing span:nth-child(2) { animation-delay:.15s; }
.typing span:nth-child(3) { animation-delay:.3s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

/* DB Badge */
.db-badge {
  display:inline-flex; align-items:center; gap:4px;
  background:rgba(124,92,252,0.12); border:1px solid var(--border);
  border-radius:8px; padding:3px 8px; font-size:10px; color:var(--muted);
}
.db-dot { width:6px; height:6px; background:#22c55e; border-radius:50%; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="setup-card">
    <div class="logo">💬 <span>Muze</span></div>
    <div class="tagline">Apna DB, Apna Data. Zero middleman.</div>
    <div style="height:1px;background:var(--border);margin:20px 0"></div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:14px">🔗 Apna PocketBase URL dalo</div>
    <input class="field" id="pbUrl" placeholder="https://your-app.up.railway.app" autocomplete="off" autocapitalize="none"/>
    <div style="font-size:11px;color:var(--muted);margin-bottom:16px">Railway, Fly.io, ya koi bhi PocketBase host</div>
    <button class="btn-primary" onclick="connect()">Connect Karo →</button>
  </div>
</div>

<!-- AUTH -->
<div id="auth">
  <div class="auth-card">
    <div class="logo" style="font-size:24px;margin-bottom:16px">💬 <span>Muze</span></div>
    <div class="auth-title" id="authTitle">Login</div>
    <div class="auth-sub" id="authSub">Apne account mein enter karo</div>
    <input class="field" id="nameIn" placeholder="Naam" style="display:none" autocomplete="off"/>
    <input class="field" id="emailIn" placeholder="Email" type="email" autocomplete="email"/>
    <input class="field" id="passIn" placeholder="Password" type="password" autocomplete="current-password"/>
    <div class="err-msg" id="authErr"></div>
    <button class="btn-primary" id="authBtn" onclick="authSubmit()">Login</button>
    <div class="switch-row">
      <span id="switchText">Account nahi?</span>
      <button class="link-btn" onclick="switchMode()">Register karo</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="app-header">
    <div class="app-logo">💬 <span>Muze</span></div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="user-pill">
        <div class="av" id="headerAv" style="width:24px;height:24px;font-size:11px"></div>
        <span id="myName" style="font-size:13px"></span>
      </div>
      <button class="logout-btn" onclick="logout()" title="Logout">⏏</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" id="tabChats" onclick="showTab('chats')">💬 Chats</button>
    <button class="tab" id="tabUsers" onclick="showTab('users')">👥 Users</button>
  </div>
  <div class="list" id="sideList">
    <div class="spinner"></div>
  </div>
</div>

<!-- CHAT VIEW -->
<div id="chatView">
  <div class="chat-header">
    <button class="back-btn" onclick="closeChat()">←</button>
    <div id="chatAv"></div>
    <div class="chat-header-info">
      <div class="chat-header-name" id="chatName"></div>
      <div class="chat-header-sub" id="chatSub">
        <span class="db-badge"><span class="db-dot"></span> Apna DB</span>
      </div>
    </div>
  </div>
  <div class="msgs-area" id="msgsArea"></div>
  <div class="input-area">
    <div class="file-preview" id="filePreview">
      <span>📎</span><span id="fileName"></span>
      <button onclick="clearFile()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px">✕</button>
    </div>
    <div class="input-row">
      <button class="attach-btn" onclick="document.getElementById('fileIn').click()">📎</button>
      <input type="file" id="fileIn" accept="image/*,video/*" style="display:none" onchange="fileChosen(this)"/>
      <input class="msg-input" id="msgIn" placeholder="Message..." autocomplete="off"/>
      <button class="send-btn" onclick="sendMsg()">↑</button>
    </div>
  </div>
</div>

<!-- FORWARD OVERLAY -->
<div id="fwdOverlay" onclick="if(event.target===this)closeFwd()">
  <div class="fwd-sheet">
    <div class="fwd-title">↪ Forward Karo</div>
    <div class="fwd-sub">Message directly unke DB mein jayega</div>
    <div id="fwdList"></div>
    <button class="cancel-btn" onclick="closeFwd()">Cancel</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/pocketbase@0.21.0/dist/pocketbase.umd.js"></script>
<script>
let pb, currentUser, currentRoom, allUsers=[], allRooms=[], currentTab='chats', forwardMsg=null, chosenFile=null, realtimeSub=null

// ── INIT ──
window.onload = () => {
  const url = localStorage.getItem('pb_url')
  if (url) {
    document.getElementById('pbUrl').value = url
    initPB(url)
  }
  document.getElementById('msgIn').addEventListener('keydown', e => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg() } })
}

function connect() {
  const url = document.getElementById('pbUrl').value.trim().replace(/\/+$/, '')
  if (!url) return toast('URL dalo pehle!')
  localStorage.setItem('pb_url', url)
  initPB(url)
}

function initPB(url) {
  try {
    pb = new PocketBase(url)
    document.getElementById('setup').style.display = 'none'
    if (pb.authStore.isValid) {
      currentUser = pb.authStore.model
      showApp()
    } else {
      document.getElementById('auth').style.display = 'flex'
    }
  } catch(e) {
    toast('Invalid URL!')
    document.getElementById('setup').style.display = 'flex'
  }
}

// ── AUTH ──
let authMode = 'login'
function switchMode() {
  authMode = authMode === 'login' ? 'register' : 'login'
  const isReg = authMode === 'register'
  document.getElementById('authTitle').textContent = isReg ? 'Register' : 'Login'
  document.getElementById('authSub').textContent = isReg ? 'Naya account banao' : 'Apne account mein enter karo'
  document.getElementById('nameIn').style.display = isReg ? 'block' : 'none'
  document.getElementById('switchText').textContent = isReg ? 'Already account hai?' : 'Account nahi?'
  document.getElementById('authBtn').textContent = isReg ? 'Register Karo' : 'Login'
  document.getElementById('authErr').style.display = 'none'
}

async function authSubmit() {
  const email = document.getElementById('emailIn').value.trim()
  const pass = document.getElementById('passIn').value
  const name = document.getElementById('nameIn').value.trim()
  const errEl = document.getElementById('authErr')
  const btn = document.getElementById('authBtn')
  errEl.style.display = 'none'
  btn.textContent = '...'
  btn.disabled = true
  try {
    if (authMode === 'register') {
      if (!name) throw new Error('Naam bhi dalo!')
      await pb.collection('users').create({ name, email, password: pass, passwordConfirm: pass })
    }
    const auth = await pb.collection('users').authWithPassword(email, pass)
    currentUser = auth.record
    document.getElementById('auth').style.display = 'none'
    showApp()
  } catch(e) {
    errEl.textContent = '⚠ ' + (e.message || 'Kuch error aaya')
    errEl.style.display = 'block'
  } finally {
    btn.textContent = authMode === 'login' ? 'Login' : 'Register Karo'
    btn.disabled = false
  }
}

function logout() {
  if (realtimeSub) try { pb.collection('messages').unsubscribe('*') } catch(e) {}
  pb.authStore.clear()
  location.reload()
}

// ── MAIN APP ──
async function showApp() {
  document.getElementById('app').style.display = 'flex'
  document.getElementById('app').style.flexDirection = 'column'
  const name = currentUser.name || currentUser.email || 'User'
  document.getElementById('myName').textContent = name
  const avEl = document.getElementById('headerAv')
  avEl.textContent = name[0].toUpperCase()
  avEl.style.background = getColor(name)
  await Promise.all([loadUsers(), loadRooms()])
  renderList()
}

async function loadUsers() {
  try {
    // Request all users — PocketBase needs "List/Search" rule set to "" (allow all authenticated)
    const list = await pb.collection('users').getFullList({ sort: 'name' })
    allUsers = list.filter(u => u.id !== currentUser.id)
  } catch(e) {
    console.warn('Users load failed:', e.message)
    allUsers = []
    // Show hint to fix API rules
    if (e.status === 403 || e.status === 400) {
      showApiRuleHint()
    }
  }
}

async function loadRooms() {
  try {
    allRooms = await pb.collection('rooms').getFullList({
      filter: `members ~ "${currentUser.id}"`,
      sort: '-updated'
    })
  } catch(e) {
    console.warn('Rooms load:', e.message)
    allRooms = []
  }
}

// ── RENDER LIST ──
function renderList() {
  const list = document.getElementById('sideList')
  if (currentTab === 'chats') {
    if (!allRooms.length) {
      list.innerHTML = `<div class="empty">
        <div class="empty-icon">💬</div>
        <div class="empty-title">Koi chat nahi abhi</div>
        <div class="empty-sub">Users tab mein jao aur kisi ko message karo</div>
      </div>`
      return
    }
    list.innerHTML = allRooms.map(r => `
      <div class="chat-item ${currentRoom?.id===r.id?'active':''}" onclick="openRoom('${r.id}')">
        ${avHTML(r.name, 40)}
        <div class="chat-item-info">
          <div class="chat-item-name">${esc(r.name)}</div>
          <div class="chat-item-sub">Tap karo chat karne ke liye</div>
        </div>
      </div>`).join('')
  } else {
    if (!allUsers.length) {
      list.innerHTML = `<div class="empty">
        <div class="empty-icon">👥</div>
        <div class="empty-title">Koi user nahi dikh raha</div>
        <div class="empty-sub">PocketBase mein users collection ki <b style="color:var(--accent)">List rule</b> ko <b style="color:var(--accent)">blank</b> karo (allow all authenticated users).<br><br>Settings → Collections → users → API Rules → List/Search → empty string</div>
      </div>`
      return
    }
    list.innerHTML = allUsers.map(u => `
      <div class="chat-item" onclick="openDM('${u.id}')">
        ${avHTML(u.name, 40)}
        <div class="chat-item-info">
          <div class="chat-item-name">${esc(u.name||u.email)}</div>
          <div class="chat-item-sub">Message karo</div>
        </div>
      </div>`).join('')
  }
}

function showTab(tab) {
  currentTab = tab
  document.getElementById('tabChats').className = 'tab' + (tab==='chats'?' active':'')
  document.getElementById('tabUsers').className = 'tab' + (tab==='users'?' active':'')
  renderList()
}

// ── DM / ROOM ──
async function openDM(userId) {
  const other = allUsers.find(u => u.id===userId)
  if (!other) return
  try {
    const existing = await pb.collection('rooms').getFullList({
      filter: `members ~ "${currentUser.id}" && members ~ "${other.id}" && isDM = true`
    })
    let room
    if (existing.length) {
      room = existing[0]
    } else {
      room = await pb.collection('rooms').create({
        name: other.name || other.email,
        members: [currentUser.id, other.id],
        isDM: true
      })
    }
    if (!allRooms.find(r => r.id===room.id)) allRooms.unshift(room)
    currentRoom = room
    renderList()
    openChatView(room)
  } catch(e) {
    toast('Error: ' + e.message)
  }
}

async function openRoom(roomId) {
  currentRoom = allRooms.find(r => r.id===roomId)
  if (!currentRoom) return
  renderList()
  openChatView(currentRoom)
}

function openChatView(room) {
  document.getElementById('chatName').textContent = room.name
  document.getElementById('chatAv').innerHTML = avHTML(room.name, 36)
  document.getElementById('chatView').style.display = 'flex'
  document.getElementById('chatView').style.flexDirection = 'column'
  loadMessages()
  // Realtime subscribe
  if (realtimeSub) try { pb.collection('messages').unsubscribe('*') } catch(e) {}
  pb.collection('messages').subscribe('*', e => {
    if (e.record.room === currentRoom?.id) loadMessages()
  }).catch(() => {})
}

function closeChat() {
  if (realtimeSub) try { pb.collection('messages').unsubscribe('*') } catch(e) {}
  currentRoom = null
  document.getElementById('chatView').style.display = 'none'
  renderList()
}

// ── MESSAGES ──
async function loadMessages() {
  const area = document.getElementById('msgsArea')
  if (!area || !currentRoom) return
  try {
    const msgs = await pb.collection('messages').getFullList({
      filter: `room = "${currentRoom.id}"`,
      sort: 'created'
    })
    window._msgs = msgs
    const wasAtBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 80
    area.innerHTML = msgs.length ? msgs.map(renderBubble).join('') : `<div class="empty"><div class="empty-icon">👋</div><div class="empty-title">Pehla message bhejo!</div></div>`
    if (wasAtBottom || msgs.length) area.scrollTop = area.scrollHeight
  } catch(e) {
    console.warn('Messages:', e.message)
  }
}

function renderBubble(m) {
  const mine = m.sender === currentUser.id
  const mUrl = m.media ? pb.files.getUrl(m, m.media) : ''
  const isVid = mUrl && /\.(mp4|mov|webm)$/i.test(mUrl)
  const time = new Date(m.created).toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' })
  return `<div class="bubble ${mine?'mine':'theirs'}">
    ${!mine ? `<div class="bubble-sender">${esc(m.senderName||'?')}</div>` : ''}
    ${m.forwardedFrom ? `<div class="bubble-fwd">↪ ${esc(m.forwardedFrom)}</div>` : ''}
    ${m.text ? `<div>${esc(m.text)}</div>` : ''}
    ${mUrl && isVid ? `<video src="${mUrl}" controls playsinline></video>` : ''}
    ${mUrl && !isVid ? `<img src="${mUrl}" loading="lazy" onclick="viewImg('${mUrl}')"/>` : ''}
    ${mUrl ? `<div class="bubble-actions">
      <button class="micro-btn" onclick="dlMedia('${mUrl}','${m.media}')">⬇ Download</button>
      <button class="micro-btn" onclick="showFwd('${m.id}')">↪ Forward</button>
    </div>` : ''}
    <div class="bubble-time ${mine?'right':''}">${time}</div>
  </div>`
}

// ── SEND ──
let sending = false
async function sendMsg() {
  if (sending) return
  const text = document.getElementById('msgIn').value.trim()
  if (!text && !chosenFile) return
  sending = true
  const btn = document.querySelector('.send-btn')
  btn.style.opacity = '0.5'
  try {
    const data = new FormData()
    data.append('text', text)
    data.append('sender', currentUser.id)
    data.append('senderName', currentUser.name || currentUser.email)
    data.append('room', currentRoom.id)
    if (chosenFile) data.append('media', chosenFile)
    await pb.collection('messages').create(data)
    document.getElementById('msgIn').value = ''
    clearFile()
    loadMessages()
  } catch(e) {
    toast('Send nahi hua: ' + e.message)
  } finally {
    sending = false
    btn.style.opacity = '1'
  }
}

function fileChosen(inp) {
  chosenFile = inp.files[0]
  if (!chosenFile) return
  const preview = document.getElementById('filePreview')
  document.getElementById('fileName').textContent = chosenFile.name
  preview.style.display = 'flex'
}

function clearFile() {
  chosenFile = null
  document.getElementById('filePreview').style.display = 'none'
  document.getElementById('fileIn').value = ''
}

// ── FORWARD ──
function showFwd(msgId) {
  forwardMsg = window._msgs?.find(m => m.id===msgId)
  if (!forwardMsg) return
  if (!allUsers.length) {
    toast('Koi aur user nahi hai')
    return
  }
  document.getElementById('fwdList').innerHTML = allUsers.map(u => `
    <div class="chat-item" onclick="doForward('${u.id}')">
      ${avHTML(u.name||u.email, 36)}
      <div class="chat-item-info">
        <div class="chat-item-name">${esc(u.name||u.email)}</div>
        <div class="chat-item-sub">Directly unke DB mein</div>
      </div>
    </div>`).join('')
  document.getElementById('fwdOverlay').style.display = 'flex'
}

function closeFwd() {
  document.getElementById('fwdOverlay').style.display = 'none'
  forwardMsg = null
}

async function doForward(userId) {
  const other = allUsers.find(u => u.id===userId)
  closeFwd()
  try {
    const ex = await pb.collection('rooms').getFullList({
      filter: `members ~ "${currentUser.id}" && members ~ "${other.id}" && isDM = true`
    })
    const room = ex.length ? ex[0] : await pb.collection('rooms').create({
      name: other.name || other.email,
      members: [currentUser.id, other.id],
      isDM: true
    })
    const data = new FormData()
    data.append('text', forwardMsg.text || '')
    data.append('sender', currentUser.id)
    data.append('senderName', currentUser.name || currentUser.email)
    data.append('room', room.id)
    data.append('forwardedFrom', forwardMsg.senderName || 'Someone')
    if (forwardMsg.media) {
      try {
        const blob = await fetch(pb.files.getUrl(forwardMsg, forwardMsg.media)).then(r => r.blob())
        data.append('media', blob, forwardMsg.media)
      } catch(e) {}
    }
    await pb.collection('messages').create(data)
    toast('✅ Forward ho gaya!')
    if (!allRooms.find(r => r.id===room.id)) {
      allRooms.unshift(room)
      renderList()
    }
  } catch(e) {
    toast('Error: ' + e.message)
  }
}

// ── UTILS ──
const COLORS = ['#7c5cfc','#ff4d8d','#06b6d4','#22c55e','#f59e0b','#e879f9','#fb923c']
function getColor(name) { return COLORS[(name||'?').charCodeAt(0) % COLORS.length] }
function avHTML(name, size) {
  const n = (name||'?')[0].toUpperCase()
  return `<div class="av" style="width:${size}px;height:${size}px;background:${getColor(name||'?')};flex-shrink:0">${n}</div>`
}
function esc(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function toast(msg, dur=2800) {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.classList.add('show')
  setTimeout(() => el.classList.remove('show'), dur)
}
function dlMedia(url, name) {
  const a = document.createElement('a')
  a.href = url; a.download = name; a.target = '_blank'; a.click()
}
function viewImg(url) {
  window.open(url, '_blank')
}
function showApiRuleHint() {
  toast('⚠ PocketBase mein users list rule fix karo — neeche dekho', 5000)
}
</script>
</body>
</html>
